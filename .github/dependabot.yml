version: 2
updates:
  # GitHub Actions — keep action versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Maven — backend/pom.xml
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      spring-boot:
        patterns: ["org.springframework.boot:*"]
      jwt:
        patterns: ["io.jsonwebtoken:*"]

  # npm/pnpm — frontend/package.json
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns: ["next", "react", "react-dom"]
      types:
        patterns: ["@types/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*"]

  # Dev containers
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
