name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Build JAR ──────────────────────────────────────────────────────────────
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Package
        run: mvn -B package -DskipTests -q
        working-directory: backend

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ── Build & push Docker images ─────────────────────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/personal-web-app-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/personal-web-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/personal-web-app-frontend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/personal-web-app-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}
            NEXT_PUBLIC_SITE_NAME=${{ vars.NEXT_PUBLIC_SITE_NAME || 'V // Night City Dev' }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-jar, build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.jar
          body: |
            ## Docker Images

            ```bash
            # Backend
            docker pull ghcr.io/${{ github.repository_owner }}/personal-web-app-backend:${{ github.ref_name }}

            # Frontend
            docker pull ghcr.io/${{ github.repository_owner }}/personal-web-app-frontend:${{ github.ref_name }}
            ```

            See [REMAINING_WORK.md](REMAINING_WORK.md) for deployment instructions.
