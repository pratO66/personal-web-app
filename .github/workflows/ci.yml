name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Java 21 / Maven
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn -B compile -q

      - name: Test (H2 in-memory via test profile)
        run: mvn -B test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Package
        run: mvn -B package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Node 22 / pnpm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          BACKEND_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}
          NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME || 'V // Night City Dev' }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}

  # ── Deploy Backend → Railway via deploy hook (push to main only) ────────────
  # WHY DEPLOY HOOK instead of `railway up`:
  #   `railway up` uploads source from the CI runner and requires a persistent
  #   personal API token. Railway OAuth tokens expire (~30 days); personal tokens
  #   issued from the dashboard are the only stable option, but easier still is
  #   a DEPLOY HOOK — a plain HTTPS URL that triggers a Railway redeploy with
  #   no auth token at all. The URL itself is the credential.
  #
  # HOW TO GET THE DEPLOY HOOK URL (one-time, 2 min):
  #   Railway dashboard → personal-web-app-backend service
  #   → Settings → Deploy Hooks → "Add Deploy Hook" → copy URL
  #   → gh secret set RAILWAY_DEPLOY_HOOK_URL --repo justcallmepratt/personal-web-app
  #
  # ALTERNATIVE (best long-term): connect Railway service to GitHub
  #   Railway dashboard → service → Settings → Source → GitHub
  #   → select justcallmepratt/personal-web-app, root dir = /backend
  #   Railway then auto-deploys on every push — remove this job entirely.
  deploy-backend:
    name: Deploy → Railway
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Railway redeploy via deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "⚠️  RAILWAY_DEPLOY_HOOK_URL secret not set."
            echo "    Get it: Railway dashboard → service → Settings → Deploy Hooks → Add"
            echo "    Then:   gh secret set RAILWAY_DEPLOY_HOOK_URL --repo justcallmepratt/personal-web-app"
            echo "    Skipping Railway deployment — backend is still running the previous version."
            exit 0
          fi

          echo "🚀 Triggering Railway redeploy..."
          HTTP=$(curl -s -o /tmp/rw.json -w "%{http_code}" -X POST "$DEPLOY_HOOK")
          echo "Response (HTTP $HTTP):" && cat /tmp/rw.json || true

          if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
            echo "✅ Railway redeploy triggered successfully (HTTP $HTTP)"
          else
            echo "❌ Deploy hook returned HTTP $HTTP — check Railway dashboard"
            exit 1
          fi

  # ── Deploy Frontend → Vercel via prebuilt (push to main only) ─────────────
  # WHY PREBUILT:
  #   `vercel --prod` triggers Vercel to clone from GitHub and build there.
  #   The project's rootDirectory was not set to "frontend", so Vercel built
  #   from the repo root and couldn't find Next.js (no package.json at root).
  #
  #   Prebuilt deployment solves this: CI builds the Next.js app here (where
  #   we control the working directory), then ships the build output to Vercel.
  #   Vercel only serves the assets — no GitHub clone, no framework detection.
  #
  # ALTERNATIVE (one-time dashboard fix):
  #   Vercel dashboard → project "frontend" → Settings → Root Directory → "frontend"
  #   After that you can revert to a simple `vercel --prod` deployment.
  deploy-frontend:
    name: Deploy → Vercel
    needs: frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build frontend (CI runner — controls env vars)
        working-directory: frontend
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.BACKEND_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME || 'V // Night City Dev' }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://frontend-liard-theta-28.vercel.app' }}
          NEXT_PUBLIC_AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}

      - name: Deploy prebuilt output to Vercel production
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
